use_default_settings: true

general:
  debug: false
  instance_name: "local-ai-search"

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  formats:
    - html
    - json

server:
  secret_key: "%(ENV_SEARXNG_SECRET)s"
  limiter: false
  image_proxy: true
  method: "GET"

valkey:
  url: "%(ENV_SEARXNG_VALKEY_URL)s"

ui:
  static_use_hash: true
