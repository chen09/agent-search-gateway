name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[api]"

      - name: Compile Python modules
        run: python -m compileall api integrations scripts tests

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Verify MCP server imports
        run: python -c "from integrations.mcp.server import main; print('mcp import ok')"

  docker:
    name: Docker build check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build retrieval API image
        uses: docker/build-push-action@v7
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64
          push: false
          tags: agent-search-gateway-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
